runConfig:
  maxInstances: 1

env:
  - variable: GOOGLE_GENAI_API_KEY
    secret: GOOGLE_GENAI_API_KEY
    availability:
      - RUNTIME
  - variable: STORAGE_BUCKET
    value: logistics-vision-c82ts.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: FIRESTORE_DB_ID
    value: logisticsvision
    availability:
      - RUNTIME
